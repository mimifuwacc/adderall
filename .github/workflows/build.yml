name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build app bundle
        run: ./scripts/build-app.sh

      - name: Zip app
        run: ditto -c -k --keepParent Adderall.app Adderall.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Adderall-app
          path: Adderall.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Adderall.zip
