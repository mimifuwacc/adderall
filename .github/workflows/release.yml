name: Release

# Build the app and attach a DMG whenever a GitHub Release is published.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build (Release)
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: ./scripts/build-app.sh

      - name: Package DMG
        run: |
          set -euo pipefail
          APP="Adderall.app"
          DMG="Adderall-${GITHUB_REF_NAME}.dmg"

          # Stage the .app next to an /Applications symlink for drag-to-install.
          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"

          hdiutil create \
            -volname "Adderall" \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            "$DMG"

          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "${DMG}" --clobber

      - name: Bump Homebrew cask
        env:
          DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          SHA="$(shasum -a 256 "$DMG" | awk '{print $1}')"

          # Push to the tap repo using the read-write deploy key.
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/tap_deploy
          chmod 600 ~/.ssh/tap_deploy
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_deploy -o IdentitiesOnly=yes"

          git clone git@github.com:mimifuwacc/homebrew-tap.git tap
          cd tap
          # macOS (BSD) sed in-place edit.
          sed -i '' -E "s/version \"[^\"]+\"/version \"${VERSION}\"/" Casks/adderall.rb
          sed -i '' -E "s/sha256 \"[^\"]+\"/sha256 \"${SHA}\"/" Casks/adderall.rb

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/adderall.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date."
            exit 0
          fi
          git commit -m "adderall ${VERSION}"
          git push origin HEAD:main
